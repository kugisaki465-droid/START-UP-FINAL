# Render.com deployment — SakaySmart Butuan
# Single service: Express backend serves the built React frontend

services:
  - type: web
    name: sakaysmart-butuan
    runtime: node
    rootDir: backend
    buildCommand: "npm install && mkdir -p data && node src/database/seed.js"
    startCommand: "node src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: ./data/sakaysmart.db
      - key: CORS_ORIGIN
        value: "*"
      - key: FIREBASE_PROJECT_ID
        value: start-up-9fe39
